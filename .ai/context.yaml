project:
  name: MilCAM
  description: Slim FreeCAD distribution for CodeSys CNC panel PCs (VEC-VE class) — FreeCAD UI used birebir, non-CAM modules compile-disabled, thin Python overlay adds CodeSys integration
  version: 0.2.0-overlay
  approach: "Slim FreeCAD build + Python workbench overlay + CPython binding"
  not_an_approach: "Custom UI; new C++ application; replacement for FreeCAD"
  origin: 2026-06-08 pivoted from initial wrong-architecture scaffold (custom QML) to overlay model
  sibling_projects:
    cadnc: /home/embed/Dev/CADNC/    # full custom CAD+CAM with QML UI — DIFFERENT architecture
    milcad: /home/embed/Dev/MilCAD/   # legacy reference only

scope:
  in_scope:
    - "Distribute FreeCAD with non-CAM modules disabled at build time"
    - "FreeCAD's own UI, unmodified, used as the operator interface"
    - "Workbench overlay (Mod/MilCAM/) that hides leftover non-CAM workbenches"
    - "Send-to-CodeSys command: post + atomic drop + OPC UA notify"
    - "Switch-to-HMI command: wmctrl raise TargetVisu"
    - "CODESYS-flavored G-code postprocessor for FreeCAD's CAM workbench"
    - "CPython C extension for drop folder + OPC UA client (open62541 in Faz 4)"
    - "Touch-first runtime tweaks (font size, Qt VirtualKeyboard input method)"
    - "Cross-compile + deploy scripts for the VEC-VE panel PC"
  out_of_scope:
    - "Custom UI (Qt/QML or otherwise) — we use FreeCAD's"
    - "Patches to FreeCAD source — use CMake flags + runtime overlay only"
    - "Reimplementing CAM operations (FreeCAD's Path/CAM workbench does this)"
    - "Reimplementing geometry import (FreeCAD's Import module does this)"

target_hardware:
  reference_device: "VEC-VE 12 inch panel PC"
  os: "Buildroot 2019.08 (embedded Linux) — DOGRULANDI 2026-06-09 via /etc/os-release"
  kernel: "Linux 4.14.98-rt53 PREEMPT-RT SMP (build 2022-05-12)"
  arch: "aarch64 (ARM 64-bit)"
  soc: "NXP i.MX 8M series (Mini or Plus; cmdline 0x30890000 base, ttymxc UART)"
  cpu: "4x ARM Cortex-A53 (part 0xd03) with HW AES/SHA1/SHA2/CRC32/PMULL/NEON"
  ram: "2 GB (2 037 148 kB) — DOGRULANDI via free -h"
  disk: "eMMC 13.8 GB, 12.6 GB free at /dev/mmcblk2p2"
  gpu: "DRM/KMS DSI panel (/dev/dri/card0, card0-DSI-1, fb0)"
  display: "12 inch 1024x768 TFT, 4-wire resistive touch"
  touch_device: "/dev/input/event1 via tslib"
  display_server: "X11 (DISPLAY=:0, QT_QPA_PLATFORM=xcb)"
  codesys_runtime: "3.15.20 Control RTE for Linux ARM (codesyscontrol_3.15.20_exit)"
  ip_eth0: "192.168.2.123/24 (NO-CARRIER)"
  ip_eth1: "192.168.1.123/24 (active, our access)"
  open_ports: "11740 (CodeSys gateway)"
  closed_ports: "22 (SSH), 23 (Telnet), 80, 8080 (WebVisu), 4840 (OPC UA)"
  ssh_daemon: "NOT INSTALLED (no dropbear, no sshd)"
  ftp_daemon: "vsftpd installed (init.d S70vsftpd)"
  dbus: "installed (init.d S30dbus)"
  access_method: "RS232 serial console at 115200 8N1 — VEC-VE pin 4=RX 8=TX 6=GND (non-standard)"
  sysprocess_in_cfg: "NOT PRESENT — must be added to /root/CODESYSControl.cfg for SendToCodesys"
  plan_decision: "Plan A confirmed (RAM 2GB, disk 12.6GB free, KMS GPU, PREEMPT-RT kernel)"
  details: "See .ai/DEVICE_PROFILE.md and .ai/SERIAL_CONSOLE_ACCESS.md; raw log .ai/DEVICE_INVENTORY_2026-06-09.log"

architecture:
  pattern: "Slim FreeCAD distribution + Python workbench overlay"
  layers:
    - layer: FreeCAD upstream
      role: "Main application, UI, viewport, CAM workbench, all geometry"
      sourced_from: "FREECAD_SOURCE_DIR (default /home/embed/Downloads/FreeCAD-main-1-1-git)"
      vendored: false
      build_method: "add_subdirectory() from MilCAM's top-level CMakeLists"
    - layer: MilCAM CMake configuration
      role: "Sets BUILD_<X>=OFF for non-CAM modules before FreeCAD builds"
      location: CMakeLists.txt
    - layer: MilCAM CodesysBridge
      role: "C++ core (drop folder + OPC UA) exposed as CPython extension"
      location: milcam/CodesysBridge/
      install_path: "${datadir}/freecad/Mod/MilCAM/CodesysBridge.so"
    - layer: MilCAM workbench overlay
      role: "Python workbench: hides others, adds commands, registers post"
      location: milcam/Mod/MilCAM/
      install_path: "${datadir}/freecad/Mod/MilCAM/"

freecad_modules:
  kept_on:
    - Gui          # the FreeCAD application window itself
    - Part         # geometry import (STEP/IGES/BREP)
    - PartDesign   # bodies — CAM operates on these
    - Sketcher     # sketches — some CAM ops use them
    - CAM          # the workbench
    - Draft        # DXF import
    - Mesh         # STL import
    - MeshPart     # Mesh ↔ Part interop
    - Material     # Part dependency
    - Spreadsheet  # tool tables / job params
    - Measure      # measure widget
    - Import       # STEP/IGES/BREP importer
  disabled_off:
    - FEM
    - BIM
    - Assembly
    - Drawing
    - Inspection
    - JtReader
    - MaterialExternal
    - OpenSCAD
    - Plot
    - Points
    - ReverseEngineering
    - Robot
    - Show
    - Surface
    - TechDraw
    - Test
    - Web
    - Cloud
    - VR
    - FlatMesh
    - DesignerPlugin
    - Sandbox
    - Template
    - Help        # heavy QtWebEngine dep — drop on panel
    - Start       # start page not relevant for kiosk use
    - Tux
    - AddonMgr    # field machines do not install addons

tech_stack:
  language_cpp: C++17 (CodesysBridge)
  language_python: Python 3 (workbench overlay + postprocessor + tests)
  build: CMake 3.22+
  ui_framework: "FreeCAD's own (Qt5/Qt6 + Coin3D + Python workbench loader)"
  cad_backend: FreeCAD (upstream, version 1.2+ recommended for CAM module)
  geometry_kernel: OpenCASCADE 7.6+ (via FreeCAD)
  python_binding: CPython stable ABI (no PyCXX dependency)
  opc_ua_client: open62541 (planned Faz 4, currently stub)
  testing: pytest (Python-only smoke); FreeCAD-bound tests in Faz 2

build:
  prereq: "Clone FreeCAD to FREECAD_SOURCE_DIR (default /home/embed/Downloads/FreeCAD-main-1-1-git)"
  configure: "cmake --preset default"
  build: "cmake --build build -j$(nproc)"
  install: "DESTDIR=$PWD/_inst cmake --install build"
  run: "DISPLAY=:0 QT_QPA_PLATFORM=xcb _inst/usr/local/bin/FreeCAD"
  overlay_only: "cmake --preset overlay-only && cmake --build build-overlay && sudo cmake --install build-overlay"
  cross_compile: "cmake --preset panel-pc"

dependencies:
  build_host_packages:
    - "All FreeCAD build deps (Qt5/Qt6, Coin3D, OCCT, Boost, Xerces-C, Python3-dev, ...)"
    - python3-pytest               # for `ctest`
    - wmctrl                       # runtime, used by SwitchToHmi command
    - libopen62541-dev             # optional, Faz 4
  panel_runtime:
    - wmctrl
    - Qt VirtualKeyboard plugin (for QT_IM_MODULE=qtvirtualkeyboard)

critical_rules:
  - "DO NOT build a custom Qt/QML UI — FreeCAD's UI is THE UI"
  - "DO NOT patch FreeCAD source — only CMake flags + runtime overlay + preferences"
  - "Module disabling lives in MilCAM's CMakeLists, NOT in FreeCAD's"
  - "Mod/MilCAM/ is pure Python; CodesysBridge is plain C++ (no FreeCAD/Qt dep)"
  - "Linux: GLX only, never EGL"
  - "Touch-first: any new UI affordance >=48px tap target"

status:
  phase: "Faz 0.5 — Overlay scaffold complete (2026-06-08)"
  done_today_2026-06-08:
    - "Recognized initial scaffold was wrong architecture (custom QML)"
    - "Deleted all custom UI / adapter / vendored freecad / cam / viewport / util / resources"
    - "Wrote new top-level CMakeLists wrapping FreeCAD with BUILD_<X>=OFF flags"
    - "Wrote milcam/CodesysBridge/ — C++ core + CPython binding + CMake"
    - "Wrote milcam/Mod/MilCAM/ — Init.py, InitGui.py, 3 commands, codesys postprocessor, 3 SVG icons"
    - "Rewrote all .ai/ docs (this batch)"
    - "Rewrote CLAUDE.md, README.md, LICENSE, .gitignore"
    - "Added pytest smoke tests"
  next_action: "Faz 1 — first end-to-end build attempt with FREECAD_SOURCE_DIR set to local clone"

reference_projects:
  freecad:
    path: /home/embed/Downloads/FreeCAD-main-1-1-git/
    role: "THE upstream — built into MilCAM via add_subdirectory()"
    size: "~3.1 GB"
    license: "LGPL-2.1-or-later"
  cadnc:
    path: /home/embed/Dev/CADNC/
    role: "Sibling project, DIFFERENT architecture. No code shared with MilCAM anymore."
  milcad:
    path: /home/embed/Dev/MilCAD/
    role: "Legacy reference only"

communication:
  code_and_comments: English
  user_communication: Turkish
  ai_docs_language: "Turkish prose with English technical terms"
