<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- YZ (Right) plane - red frame with crosshair -->
  <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="#DC2626" stroke-width="1.8"/>
  <!-- Horizontal axis -->
  <line x1="3" y1="12" x2="21" y2="12" stroke="#DC2626" stroke-width="0.8" stroke-dasharray="2,1.5"/>
  <!-- Vertical axis -->
  <line x1="12" y1="3" x2="12" y2="21" stroke="#DC2626" stroke-width="0.8" stroke-dasharray="2,1.5"/>
  <!-- Center cross -->
  <line x1="10" y1="12" x2="14" y2="12" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="12" y1="10" x2="12" y2="14" stroke="#DC2626" stroke-width="1.5"/>
  <!-- Perspective depth hint -->
  <line x1="3" y1="3" x2="1" y2="1" stroke="#DC2626" stroke-width="0.6" opacity="0.4"/>
  <line x1="3" y1="21" x2="1" y2="23" stroke="#DC2626" stroke-width="0.6" opacity="0.4"/>
</svg>
