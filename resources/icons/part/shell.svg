<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <!-- Outer box -->
  <rect x="3" y="6" width="18" height="14" rx="1" fill="url(#g)" stroke="#1E40AF" stroke-width="0.7"/>
  <!-- Inner cavity (shell) -->
  <rect x="5" y="6" width="14" height="10" rx="0.5" fill="#E0F2FE" stroke="#93C5FD" stroke-width="0.5"/>
  <!-- Wall thickness lines -->
  <line x1="5" y1="20" x2="5" y2="6" stroke="#1E40AF" stroke-width="1.5"/>
  <line x1="19" y1="20" x2="19" y2="6" stroke="#1E40AF" stroke-width="1.5"/>
  <line x1="5" y1="20" x2="19" y2="20" stroke="#1E40AF" stroke-width="1.5"/>
</svg>
