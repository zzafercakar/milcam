<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20">
  <defs>
    <linearGradient id="bit" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="50%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <!-- Bold CNC end mill -->
  <rect x="7.5" y="0.5" width="5" height="8" rx="1" fill="url(#bit)" stroke="#4B5563" stroke-width="0.8"/>
  <rect x="8.5" y="1.2" width="1.2" height="6" rx="0.5" fill="rgba(255,255,255,0.7)"/>
  <!-- Tool tip -->
  <path d="M7.5 8.5l2.5 4 2.5-4" fill="#F59E0B" stroke="#92400E" stroke-width="0.7"/>
  <!-- Bold toolpath lines -->
  <line x1="2" y1="14" x2="18" y2="14" stroke="url(#path)" stroke-width="2" stroke-linecap="round"/>
  <line x1="2" y1="17" x2="18" y2="17" stroke="url(#path)" stroke-width="2" stroke-linecap="round"/>
  <!-- Entry point -->
  <circle cx="2" cy="11.5" r="1.8" fill="#EF4444" stroke="#991B1B" stroke-width="0.5"/>
  <line x1="2" y1="11.5" x2="4" y2="14" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
</svg>
